<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>W-Core — Sala de Controle</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

  <header class="topbar">
    <span class="topbar-logo">W-<span>Core</span></span>
    <nav class="topbar-right">
      <span class="topbar-user">operador@planta42.com</span>
      <a href="login.html" class="btn-logout">sair</a>
    </nav>
  </header>

  <main class="container">

    <p class="page-title">planta 42 — monitoramento em tempo real</p>

    <section class="summary">
      <div class="summary-card">
        <p class="summary-label">total</p>
        <p class="summary-value" id="total">8</p>
      </div>
      <div class="summary-card">
        <p class="summary-label">online</p>
        <p class="summary-value green" id="count-online">0</p>
      </div>
      <div class="summary-card">
        <p class="summary-label">alerta</p>
        <p class="summary-value amber" id="count-alerta">0</p>
      </div>
      <div class="summary-card">
        <p class="summary-label">crítico</p>
        <p class="summary-value red" id="count-critico">0</p>
      </div>
    </section>

    <section class="sensors-grid" id="sensors-grid">
    </section>

  </main>

  <footer class="footer">
    <span>w-core v0.1.0</span>
    <span>planta 42 — sistema operacional</span>
  </footer>

  <script src="js/dashboard.js"></script>

</body>
</html>
